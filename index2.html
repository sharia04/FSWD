<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FSD Header</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    .top-box {
        width: 100%;
        background: #0f4470;
        color: rgb(237, 238, 239);
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .left {
        font-size: 26px;
        font-weight: bold;
    }

    .right {
        display: flex;
        gap: 20px;
        font-size: 18px;
    }

    .right span {
        background: #444;
        padding: 8px 15px;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div class="top-box">
    <div class="left">FSD</div>

    <div class="right">
        <span>HTML</span>
        <span>CSS</span>
        <span>Node.js</span>
        <span>React.js</span>
    </div>
</div>

</body>
</html>
